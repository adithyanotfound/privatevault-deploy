# botbook-deployment.yaml
# Kubernetes manifests for BotBook

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: botbook-api
  namespace: botbook
  labels:
    app: botbook-api
    version: "0.1.0"
spec:
  replicas: 10
  selector:
    matchLabels:
      app: botbook-api
  template:
    metadata:
      labels:
        app: botbook-api
    spec:
      containers:
        - name: botbook-api
          image: gcr.io/intent-engine-482103/botbook-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: LORK_URL
              valueFrom:
                secretKeyRef:
                  name: botbook-secrets
                  key: lork-url
            - name: VAULT_URL
              valueFrom:
                secretKeyRef:
                  name: botbook-secrets
                  key: vault-url
            - name: LORK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: botbook-secrets
                  key: lork-api-key
            - name: VAULT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: botbook-secrets
                  key: vault-api-key
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: botbook-secrets
                  key: redis-url
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: botbook-secrets
                  key: database-url
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: botbook-api-hpa
  namespace: botbook
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: botbook-api
  minReplicas: 10
  maxReplicas: 200
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

---
apiVersion: v1
kind: Service
metadata:
  name: botbook-api-svc
  namespace: botbook
spec:
  selector:
    app: botbook-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: botbook-ingress
  namespace: botbook
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1s"
spec:
  rules:
    - host: api.botbook.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: botbook-api-svc
                port:
                  number: 80
